<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 背景 -->
  <rect width="64" height="64" rx="12" fill="#0A0A0A"/>
  <!-- 相框外框 -->
  <rect x="12" y="16" width="40" height="40" rx="2" stroke="#FFFFFF" stroke-width="3" fill="none"/>
  <!-- 相框内部 -->
  <rect x="17" y="21" width="30" height="30" rx="1" fill="#EC4899" opacity="0.15"/>
  <!-- 出框主体 - 一个人形剪影从相框顶部冲出 -->
  <g transform="translate(32, 28)">
    <!-- 头部 -->
    <circle cx="0" cy="-16" r="6" fill="#EC4899"/>
    <!-- 身体 -->
    <path d="M-8 -8 Q-10 2 -6 10 L6 10 Q10 2 8 -8 Q4 -12 0 -10 Q-4 -12 -8 -8Z" fill="#EC4899"/>
    <!-- 手臂向上伸展 - 冲出感 -->
    <path d="M-8 -6 L-14 -18" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 -6 L14 -18" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 遮盖相框内部下半部分（模拟出框效果：上半身在框外，下半身在框内） -->
  <rect x="12" y="36" width="40" height="20" rx="0" fill="#0A0A0A" opacity="0"/>
  <!-- 相框顶部边框重绘（被主体遮挡的部分不重绘，产生出框视觉） -->
</svg>
