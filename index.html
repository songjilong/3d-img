<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>照片出框效果</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      /* ============================================================
         Neubrutalism 设计令牌
         @author system
         ============================================================ */
      :root {
        --bg-primary: #FDF2F8;
        --bg-surface: #FFFFFF;
        --bg-dark: #0A0A0A;
        --bg-yellow: #FFEB3B;
        --border-brutal: #0A0A0A;
        --border-width: 3px;
        --shadow-brutal: 6px 6px 0 #0A0A0A;
        --shadow-brutal-sm: 4px 4px 0 #0A0A0A;
        --shadow-brutal-hover: 10px 10px 0 #0A0A0A;
        --shadow-accent: 6px 6px 0 #EC4899;
        --accent: #EC4899;
        --accent-light: #F9A8D4;
        --accent-cyan: #06B6D4;
        --accent-yellow: #FFEB3B;
        --accent-red: #FF5252;
        --text-primary: #0A0A0A;
        --text-secondary: #831843;
        --text-muted: rgba(131, 24, 67, 0.5);
        --font-heading: 'Archivo', system-ui, sans-serif;
        --font-body: 'Space Grotesk', system-ui, sans-serif;
        --transition-fast: 150ms ease;
      }

      /* ============================================================
         全局基础样式
         ============================================================ */
      *, *::before, *::after {
        margin: 0; padding: 0; box-sizing: border-box;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-body);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 40px 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      /* 应用标题 - Brutalist 风格 */
      .app-title {
        font-family: var(--font-heading);
        font-size: 32px;
        font-weight: 900;
        color: var(--text-primary);
        text-align: center;
        letter-spacing: -0.03em;
        text-transform: uppercase;
      }
      .app-title span {
        color: var(--accent);
      }

      /* ============================================================
         阶段区域
         ============================================================ */
      .stage-section {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: center;
      }
      .stage-section.active {
        display: flex;
      }

      /* ============================================================
         加载指示器
         ============================================================ */
      #loading-indicator {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 56px 24px;
      }
      #loading-indicator.active {
        display: flex;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: var(--border-width) solid rgba(236, 72, 153, 0.2);
        border-top-color: var(--accent);
        border-radius: 0;
        animation: spin 0.6s steps(8) infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #loading-text {
        color: var(--text-secondary);
        font-family: var(--font-heading);
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ============================================================
         错误提示横幅
         ============================================================ */
      #error-banner {
        display: none;
        width: 100%;
        max-width: 560px;
        color: var(--accent-red);
        background-color: var(--bg-surface);
        border: var(--border-width) solid var(--accent-red);
        box-shadow: 4px 4px 0 var(--accent-red);
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 500;
        text-align: center;
        line-height: 1.6;
      }
      #error-banner.active {
        display: block;
      }

      /* ============================================================
         调整阶段布局
         ============================================================ */
      .adjust-layout {
        width: 100%;
        display: flex;
        gap: 24px;
        align-items: flex-start;
        justify-content: center;
        flex-wrap: wrap;
      }

      /* 画布预览区域 - 暗色背景保证照片观感 */
      #canvas-preview {
        flex: 1 1 480px;
        max-width: 620px;
        min-width: 280px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background: var(--bg-dark);
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal);
        overflow: hidden;
        padding: 4px;
      }
      #canvas-preview canvas {
        max-width: 100%;
        height: auto;
        display: block;
      }

      .right-panel {
        flex: 0 0 320px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ============================================================
         prefers-reduced-motion
         ============================================================ */
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation-duration: 1.5s; }
        * { transition-duration: 0.01ms !important; }
      }

      /* ============================================================
         响应式
         ============================================================ */
      @media (max-width: 768px) {
        body { padding: 24px 12px; }
        .app-title { font-size: 26px; }
        .right-panel { flex: 1 1 100%; max-width: 100%; }
      }
      @media (max-width: 375px) {
        body { padding: 16px 8px; }
        .app-title { font-size: 22px; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1 class="app-title">照片出框<span>效果</span></h1>
      <div id="error-banner"></div>
      <div id="loading-indicator">
        <div class="spinner"></div>
        <span id="loading-text">正在处理...</span>
      </div>
      <div id="stage-upload" class="stage-section active"></div>
      <div id="stage-segmentation-preview" class="stage-section"></div>
      <div id="stage-adjusting" class="stage-section">
        <div class="adjust-layout">
          <div id="canvas-preview"></div>
          <div class="right-panel">
            <div id="controls-container"></div>
            <div id="export-container"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
