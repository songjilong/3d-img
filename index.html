<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FrameBreak — 让你的照片冲出相框</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      /* ============================================================
         Neubrutalism 设计令牌
         @author system
         ============================================================ */
      :root {
        --bg-primary: #FDF2F8;
        --bg-surface: #FFFFFF;
        --bg-dark: #0A0A0A;
        --bg-yellow: #FFEB3B;
        --border-brutal: #0A0A0A;
        --border-width: 3px;
        --shadow-brutal: 6px 6px 0 #0A0A0A;
        --shadow-brutal-sm: 4px 4px 0 #0A0A0A;
        --shadow-brutal-hover: 10px 10px 0 #0A0A0A;
        --shadow-accent: 6px 6px 0 #EC4899;
        --accent: #EC4899;
        --accent-light: #F9A8D4;
        --accent-cyan: #06B6D4;
        --accent-yellow: #FFEB3B;
        --accent-red: #FF5252;
        --text-primary: #0A0A0A;
        --text-secondary: #831843;
        --text-muted: rgba(131, 24, 67, 0.5);
        --font-heading: 'Archivo', system-ui, sans-serif;
        --font-body: 'Space Grotesk', system-ui, sans-serif;
        --transition-fast: 150ms ease;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-body);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 0 16px;
      }

      /* ============================================================
         Hero 区域
         ============================================================ */
      .hero {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 0 40px;
        gap: 24px;
      }

      /* Logo */
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-icon {
        width: 52px; height: 52px;
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal-sm);
        background: var(--bg-dark);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .logo-text {
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: 28px;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        line-height: 1;
      }
      .logo-text span { color: var(--accent); }

      /* 标语 */
      .hero-tagline {
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: clamp(28px, 6vw, 52px);
        text-align: center;
        letter-spacing: -0.03em;
        line-height: 1.1;
        text-transform: uppercase;
        max-width: 700px;
      }
      .hero-tagline .highlight {
        color: var(--accent);
        position: relative;
        display: inline-block;
      }
      .hero-tagline .highlight::after {
        content: '';
        position: absolute;
        bottom: 2px; left: -4px; right: -4px;
        height: 8px;
        background: var(--accent-yellow);
        z-index: -1;
        transform: rotate(-1deg);
      }

      .hero-desc {
        font-size: 16px;
        color: var(--text-muted);
        text-align: center;
        max-width: 480px;
        line-height: 1.7;
      }

      /* 开始按钮 */
      .hero-cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 36px;
        background: var(--bg-dark);
        color: #FFFFFF;
        font-family: var(--font-heading);
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal);
        cursor: pointer;
        transition: all var(--transition-fast);
        text-decoration: none;
      }
      .hero-cta:hover {
        background: var(--accent);
        box-shadow: var(--shadow-brutal-hover);
        transform: translate(-2px, -2px);
      }
      .hero-cta:active {
        box-shadow: 2px 2px 0 var(--border-brutal);
        transform: translate(2px, 2px);
      }

      /* ============================================================
         3D 效果演示图
         ============================================================ */
      .demo-illustration {
        width: 100%;
        max-width: 400px;
        aspect-ratio: 1;
        position: relative;
        margin: 8px 0 16px;
      }
      .demo-frame {
        position: absolute;
        top: 18%; left: 15%; width: 70%; height: 70%;
        border: var(--border-width) solid var(--border-brutal);
        background: var(--bg-surface);
        box-shadow: var(--shadow-brutal);
        display: flex; align-items: center; justify-content: center;
        overflow: visible;
      }
      .demo-frame-inner {
        width: calc(100% - 16px); height: calc(100% - 32px);
        margin-top: -8px;
        background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
        position: relative;
        overflow: visible;
      }
      /* 出框的人物剪影 */
      .demo-popout {
        position: absolute;
        bottom: 20%; left: 50%;
        transform: translateX(-50%);
        width: 45%; height: 80%;
      }
      .demo-popout svg {
        width: 100%; height: 100%;
        filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.15));
      }
      /* 相框底部参数文字 */
      .demo-meta {
        position: absolute;
        bottom: 4px; left: 0; right: 0;
        text-align: center;
        font-size: 8px;
        color: var(--text-muted);
        font-family: var(--font-body);
        letter-spacing: 0.05em;
      }
      /* 装饰标签 */
      .demo-tag {
        position: absolute;
        padding: 6px 14px;
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal-sm);
      }
      .demo-tag-3d {
        top: 6%; right: 4%;
        background: var(--accent);
        color: #FFF;
        transform: rotate(3deg);
      }
      .demo-tag-ai {
        bottom: 8%; left: 2%;
        background: var(--accent-yellow);
        color: var(--text-primary);
        transform: rotate(-2deg);
      }

      /* ============================================================
         特色功能区
         ============================================================ */
      .features {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        padding: 0 0 40px;
      }
      .feature-card {
        background: var(--bg-surface);
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal-sm);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: all var(--transition-fast);
      }
      .feature-card:hover {
        box-shadow: var(--shadow-brutal);
        transform: translate(-1px, -1px);
      }
      .feature-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        border: var(--border-width) solid var(--border-brutal);
      }
      .feature-icon.pink { background: var(--accent); color: #FFF; }
      .feature-icon.cyan { background: var(--accent-cyan); color: #FFF; }
      .feature-icon.yellow { background: var(--accent-yellow); color: var(--text-primary); }
      .feature-title {
        font-family: var(--font-heading);
        font-weight: 900;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }
      .feature-desc {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      /* ============================================================
         分隔线
         ============================================================ */
      .divider-brutal {
        width: 100%;
        height: 0;
        border-top: var(--border-width) solid var(--border-brutal);
        margin: 0 0 32px;
      }

      /* ============================================================
         工作区标题
         ============================================================ */
      .section-title {
        font-family: var(--font-heading);
        font-size: 20px;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-bottom: 20px;
        color: var(--text-primary);
      }
      .section-title span { color: var(--accent); }

      /* ============================================================
         阶段区域
         ============================================================ */
      .stage-section {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: center;
        padding-bottom: 48px;
      }
      .stage-section.active { display: flex; }

      /* ============================================================
         加载指示器
         ============================================================ */
      #loading-indicator {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 56px 24px;
      }
      #loading-indicator.active { display: flex; }

      .spinner {
        width: 36px; height: 36px;
        border: var(--border-width) solid rgba(236, 72, 153, 0.2);
        border-top-color: var(--accent);
        animation: spin 0.6s steps(8) infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #loading-text {
        color: var(--text-secondary);
        font-family: var(--font-heading);
        font-size: 14px; font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ============================================================
         错误提示
         ============================================================ */
      #error-banner {
        display: none;
        width: 100%; max-width: 560px;
        color: var(--accent-red);
        background-color: var(--bg-surface);
        border: var(--border-width) solid var(--accent-red);
        box-shadow: 4px 4px 0 var(--accent-red);
        padding: 14px 20px;
        font-size: 14px; font-weight: 500;
        text-align: center; line-height: 1.6;
      }
      #error-banner.active { display: block; }

      /* ============================================================
         调整阶段布局
         ============================================================ */
      .adjust-layout {
        width: 100%;
        display: flex; gap: 24px;
        align-items: flex-start;
        justify-content: center;
        flex-wrap: wrap;
      }
      #canvas-preview {
        flex: 1 1 480px;
        max-width: 620px; min-width: 280px;
        display: flex; justify-content: center; align-items: flex-start;
        background: var(--bg-dark);
        border: var(--border-width) solid var(--border-brutal);
        box-shadow: var(--shadow-brutal);
        overflow: hidden; padding: 4px;
      }
      #canvas-preview canvas {
        max-width: 100%; height: auto; display: block;
      }
      .right-panel {
        flex: 0 0 320px;
        display: flex; flex-direction: column; gap: 16px;
      }

      /* ============================================================
         Footer
         ============================================================ */
      .site-footer {
        width: 100%;
        border-top: var(--border-width) solid var(--border-brutal);
        padding: 24px 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: auto;
      }
      .site-footer p {
        font-size: 12px;
        color: var(--text-muted);
        font-family: var(--font-heading);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .site-footer span { color: var(--accent); }

      /* ============================================================
         prefers-reduced-motion
         ============================================================ */
      @media (prefers-reduced-motion: reduce) {
        .spinner { animation-duration: 1.5s; }
        * { transition-duration: 0.01ms !important; }
      }

      /* ============================================================
         响应式
         ============================================================ */
      @media (max-width: 768px) {
        #app { padding: 0 12px; }
        .hero { padding: 32px 0 28px; }
        .right-panel { flex: 1 1 100%; max-width: 100%; }
        .demo-illustration { max-width: 300px; }
      }
      @media (max-width: 375px) {
        #app { padding: 0 8px; }
        .hero { padding: 24px 0 20px; }
      }
    </style>
  </head>
  <body>
    <div id="app">

      <!-- ============================================================
           Hero 区域
           ============================================================ -->
      <div class="hero" id="hero-section">
        <!-- Logo -->
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" width="36" height="36">
              <rect x="10" y="18" width="44" height="38" rx="2" stroke="#FFFFFF" stroke-width="3" fill="none"/>
              <circle cx="32" cy="22" r="7" fill="#EC4899"/>
              <path d="M22 32 Q20 42 24 50 L40 50 Q44 42 42 32 Q38 28 32 30 Q26 28 22 32Z" fill="#EC4899"/>
              <path d="M22 34 L16 20" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
              <path d="M42 34 L48 20" stroke="#EC4899" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="logo-text">Frame<span>Break</span></div>
        </div>

        <!-- 标语 -->
        <h1 class="hero-tagline">
          让你的照片<br/><span class="highlight">冲出相框</span>
        </h1>

        <p class="hero-desc">
          AI 智能识别照片主体，一键生成 3D 出框效果。<br/>
          主体跃出相框边界，打造令人惊叹的视觉冲击。
        </p>

        <!-- 3D 效果演示 -->
        <div class="demo-illustration">
          <div class="demo-frame">
            <div class="demo-frame-inner">
              <!-- 出框人物剪影 -->
              <div class="demo-popout">
                <svg viewBox="0 0 120 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <!-- 头部 -->
                  <circle cx="60" cy="30" r="22" fill="#831843"/>
                  <!-- 身体 -->
                  <path d="M35 60 Q30 90 38 140 L82 140 Q90 90 85 60 Q75 50 60 52 Q45 50 35 60Z" fill="#831843"/>
                  <!-- 左臂向上 -->
                  <path d="M38 70 L12 30" stroke="#831843" stroke-width="8" stroke-linecap="round"/>
                  <!-- 右臂向上 -->
                  <path d="M82 70 L108 30" stroke="#831843" stroke-width="8" stroke-linecap="round"/>
                  <!-- 左手星星 -->
                  <circle cx="10" cy="26" r="6" fill="#EC4899"/>
                  <!-- 右手星星 -->
                  <circle cx="110" cy="26" r="6" fill="#EC4899"/>
                  <!-- 腿 -->
                  <path d="M45 138 L40 190" stroke="#831843" stroke-width="9" stroke-linecap="round"/>
                  <path d="M75 138 L80 190" stroke="#831843" stroke-width="9" stroke-linecap="round"/>
                </svg>
              </div>
            </div>
            <div class="demo-meta">f/2.8 · 1/250s · ISO 400</div>
          </div>
          <!-- 装饰标签 -->
          <div class="demo-tag demo-tag-3d">3D 出框</div>
          <div class="demo-tag demo-tag-ai">AI 分割</div>
        </div>

        <!-- CTA 按钮 -->
        <button class="hero-cta" id="start-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          开始制作
        </button>
      </div>

      <!-- ============================================================
           特色功能
           ============================================================ -->
      <div class="features" id="features-section">
        <div class="feature-card">
          <div class="feature-icon pink">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 3Z"/><path d="M17 4a2 2 0 0 0 2 2 2 2 0 0 0-2 2 2 2 0 0 0-2-2 2 2 0 0 0 2-2"/></svg>
          </div>
          <div class="feature-title">AI 智能分割</div>
          <div class="feature-desc">基于深度学习的前景分割模型，自动识别照片主体，精准提取人物、动物等前景元素。</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon cyan">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          </div>
          <div class="feature-title">实时预览调整</div>
          <div class="feature-desc">自由调整照片位置、缩放、边框宽度、背景颜色，所有参数实时预览，所见即所得。</div>
        </div>
        <div class="feature-card">
          <div class="feature-icon yellow">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <div class="feature-title">多格式导出</div>
          <div class="feature-desc">支持 PNG、JPEG 静态图和动态视频导出，自动读取 EXIF 拍摄参数，一键生成专业效果图。</div>
        </div>
      </div>

      <!-- 分隔线 -->
      <div class="divider-brutal" id="workspace-divider" style="display: none;"></div>

      <!-- 工作区标题 -->
      <h2 class="section-title" id="workspace-title" style="display: none;">
        上传你的<span>照片</span>
      </h2>

      <!-- 错误提示 -->
      <div id="error-banner"></div>

      <!-- 加载指示器 -->
      <div id="loading-indicator">
        <div class="spinner"></div>
        <span id="loading-text">正在处理...</span>
      </div>

      <!-- 阶段 1：上传 -->
      <div id="stage-upload" class="stage-section"></div>

      <!-- 阶段 2：分割预览 -->
      <div id="stage-segmentation-preview" class="stage-section"></div>

      <!-- 阶段 3：调整 -->
      <div id="stage-adjusting" class="stage-section">
        <div class="adjust-layout">
          <div id="canvas-preview"></div>
          <div class="right-panel">
            <div id="controls-container"></div>
            <div id="export-container"></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="site-footer">
        <p>Frame<span>Break</span> — 让你的照片冲出相框</p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
